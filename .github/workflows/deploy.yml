name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Trigger Render deploy
        if: success()
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            --url "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}")
          echo "Render response code: $HTTP_CODE"
          echo "$HTTP_CODE" | grep -q "^2" && echo "Deploy triggered" || (echo "Deploy trigger failed" && exit 1)
