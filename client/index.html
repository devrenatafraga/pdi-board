<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDI Board 🎲</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/scoreboard.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <div class="login-logo">🎲</div>
      <h1 class="login-title">PDI Board</h1>
      <p class="login-subtitle">Seu plano de desenvolvimento individual gamificado</p>
      <button id="btn-google-signin" class="btn-google-signin">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
      <p class="login-hint">Entre com sua conta Google para acessar seu PDI de forma segura.</p>
    </div>
  </div>

  <!-- SETUP WIZARD (shown on first access) -->
  <div id="setup-overlay" class="hidden">
    <div class="setup-modal">
      <div id="setup-content"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">

    <!-- NAV -->
    <nav class="nav">
      <div class="nav-brand">🎲 PDI Board</div>
      <ul class="nav-tabs" id="nav-tabs">
        <li><button class="nav-btn active" data-frame="dashboard">🏠 Dashboard</button></li>
        <li><button class="nav-btn" data-frame="instructions">📋 Regras</button></li>
        <!-- theme tabs injected dynamically by board.js -->
        <li id="nav-li-scoreboard"><button class="nav-btn" data-frame="scoreboard">🏆 Placar</button></li>
        <li id="nav-li-evidence"><button class="nav-btn" data-frame="evidence">📌 Evidências</button></li>
        <li id="nav-li-reports"><button class="nav-btn" data-frame="reports">📊 Relatórios</button></li>
      </ul>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-sm" id="btn-theme-toggle" title="Alternar modo claro/escuro">🌙</button>
        <button class="btn btn-ghost btn-sm" id="btn-reset-config" title="Reconfigurar">⚙️</button>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <!-- FRAMES -->
    <main class="main" id="main-frames">

      <!-- DASHBOARD -->
      <section id="frame-dashboard" class="frame active">
        <div id="dashboard-content"></div>
      </section>

      <!-- INSTRUCTIONS -->
      <section id="frame-instructions" class="frame">
        <div id="instructions-content"></div>
      </section>

      <!-- BOARDS injected dynamically -->

      <!-- SCOREBOARD -->
      <section id="frame-scoreboard" class="frame">
        <div id="scoreboard-content"></div>
      </section>

      <!-- EVIDENCE -->
      <section id="frame-evidence" class="frame">
        <div id="evidence-content"></div>
      </section>

      <!-- REPORTS -->
      <section id="frame-reports" class="frame">
        <div id="reports-content"></div>
      </section>

    </main>
  </div>

  <!-- MODAL CHECKPOINT -->
  <div id="checkpoint-modal" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="close-checkpoint-modal">✕</button>
      <div id="checkpoint-modal-content"></div>
    </div>
  </div>

  <!-- MODAL 1:1 -->
  <div id="oneOnOne-modal" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="close-oneOnOne-modal">✕</button>
      <div id="oneOnOne-modal-content"></div>
    </div>
  </div>

  <!-- MODAL EVIDENCE -->
  <div id="evidence-modal" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="close-evidence-modal">✕</button>
      <div id="evidence-modal-content"></div>
    </div>
  </div>

   <script src="js/logger.js"></script>

   <!-- Clerk JS (loaded async; CLERK_PUBLISHABLE_KEY injected by auth.js) -->
   <script>window.__clerk_publishable_key = '%%CLERK_PUBLISHABLE_KEY%%';</script>
   <script src="js/clerkDiagnostics.js"></script>
   <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/board.js"></script>
  <script src="js/token.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/scoreboard.js"></script>
  <script src="js/evidence.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
