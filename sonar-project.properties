# SonarCloud Configuration
sonar.projectKey=devrenatafraga_pdi-board
sonar.organization=devrenatafraga

# Project metadata
sonar.projectName=PDI Board
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=server,client/js
sonar.tests=server/__tests__
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/coverage/**,**/__tests__/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/node_modules/**

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
